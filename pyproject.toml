[tool.poetry]
name = "ll-dm"
version = "0.1.0"
description = "A LLM-powered dungeon master"
authors = ["d1ggs"]
readme = "README.md"
packages = [{include = "ll_dm"}]

[tool.poetry.dependencies]
python = "~3.9.0"
openai = "^0.27.6"
python-dotenv = "^1.0.0"
tiktoken = "^0.4.0"
pychatgpt = "^0.4.3.3"
ipykernel = "^6.23.0"
forex-python = "^1.8"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
